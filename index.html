<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda JesusTo</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --button-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--button-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-3px);
            background-color: #334155;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/100" alt="Foto de Perfil" class="profile-pic">
        
        <h1>Tu Nombre Aquí</h1>
        <p>Ingeniero de Sistemas | Full Stack Developer</p>

        <div class="links-container">
            <a href="https://linkedin.com/in/tuusuario" class="link-card" target="_blank">LinkedIn Profesional</a>
            <a href="https://github.com/tuusuario" class="link-card" target="_blank">Portafolio GitHub</a>
            <a href="https://tuweb.com" class="link-card" target="_blank">Sitio Web Personal</a>
            <a href="mailto:correo@ejemplo.com" class="link-card" target="_blank">Contactar por Email</a>
        </div>
    </div>

    <div class="footer">
        © 2026 - Desarrollado con ❤️ y Código Limpio
    </div>

</body>
</html>
